<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toss Live Confirm Test</title>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
        .wrap { max-width: 1100px; margin: 24px auto; padding: 18px; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; }
        h1 { font-size: 22px; margin: 0 0 8px; }
        .hint { margin: 0 0 16px; color: #4b5563; font-size: 13px; }
        .row { display: grid; grid-template-columns: 220px 1fr; gap: 8px; margin-bottom: 10px; align-items: center; }
        .row label { font-size: 14px; color: #374151; }
        input, textarea, button { font-size: 14px; }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 8px;
        }
        textarea { min-height: 70px; resize: vertical; }
        .mono { font-family: Consolas, monospace; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        button { border: 0; border-radius: 6px; color: #fff; background: #0f766e; padding: 9px 14px; cursor: pointer; }
        button.secondary { background: #374151; }
        button.warn { background: #b45309; }
        .box { border: 1px solid #e5e7eb; border-radius: 6px; background: #fafafa; padding: 12px; margin-top: 16px; }
        pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Toss 결제 Confirm 테스트</h1>
    <p class="hint">
        순서: 1) 주문 자동 생성(차주 수락 + 운송완료) 2) Prepare 3) 결제창 열기 4) 결제 완료 복귀 5) Confirm 6) Driver Confirm
    </p>

    <div class="row">
        <label>Base URL</label>
        <input id="baseUrl" class="mono" readonly>
    </div>
    <div class="row">
        <label for="shipperToken">Shipper Token</label>
        <textarea id="shipperToken" class="mono" placeholder="Bearer 제외 access token"></textarea>
    </div>
    <div class="row">
        <label for="driverToken">Driver Token</label>
        <textarea id="driverToken" class="mono" placeholder="Bearer 제외 access token"></textarea>
    </div>
    <div class="row">
        <label for="clientKey">Toss Client Key</label>
        <input id="clientKey" class="mono" placeholder="test_ck_...">
    </div>
    <div class="row">
        <label for="orderId">Order ID</label>
        <input id="orderId" class="mono" placeholder="1번 버튼으로 자동 생성됨">
    </div>
    <div class="row">
        <label for="pgOrderId">pgOrderId</label>
        <input id="pgOrderId" class="mono" placeholder="prepare 결과 자동 세팅">
    </div>
    <div class="row">
        <label for="amount">amount</label>
        <input id="amount" class="mono" placeholder="prepare 결과 자동 세팅">
    </div>
    <div class="row">
        <label for="paymentKey">paymentKey</label>
        <input id="paymentKey" class="mono" placeholder="토스 성공 리다이렉트에서 자동 세팅">
    </div>
    <div class="row">
        <label for="successUrl">successUrl</label>
        <input id="successUrl" class="mono" readonly>
    </div>
    <div class="row">
        <label for="failUrl">failUrl</label>
        <input id="failUrl" class="mono" readonly>
    </div>

    <div class="actions">
        <button type="button" class="secondary" onclick="saveInputs()">입력 저장</button>
        <button type="button" class="secondary" onclick="bootstrapOrderFlow()">1) 주문 자동 생성</button>
        <button type="button" onclick="prepare()">2) Prepare</button>
        <button type="button" onclick="openTossWindow()">3) 결제창 열기</button>
        <button type="button" class="warn" onclick="confirmToss()">4) Confirm</button>
        <button type="button" class="warn" onclick="driverConfirm()">5) Driver Confirm</button>
        <button type="button" class="secondary" onclick="clearLog()">로그 지우기</button>
    </div>

    <div class="box mono"><pre id="redirectInfo">redirect: none</pre></div>
    <div class="box mono"><pre id="prepareInfo">prepare: none</pre></div>
    <div class="box mono"><pre id="log">ready</pre></div>
</div>

<script>
    const LS_KEY = "toss_live_test_v2";
    const LS_PREPARE = "toss_live_prepare_v2";

    function log(message, payload) {
        const el = document.getElementById("log");
        const line = "[" + new Date().toISOString() + "] " + message;
        if (payload === undefined) {
            el.textContent += "\n" + line;
            return;
        }
        let pretty = "";
        try {
            pretty = JSON.stringify(payload, null, 2);
        } catch (e) {
            pretty = String(payload);
        }
        el.textContent += "\n" + line + "\n" + pretty;
    }

    function clearLog() {
        document.getElementById("log").textContent = "ready";
    }

    function getBaseUrl() {
        return window.location.origin;
    }

    function getPageUrlWithoutQuery() {
        return window.location.origin + window.location.pathname;
    }

    function getSuccessUrl() {
        return getPageUrlWithoutQuery() + "?flow=success";
    }

    function getFailUrl() {
        return getPageUrlWithoutQuery() + "?flow=fail";
    }

    function getValue(id) {
        return document.getElementById(id).value.trim();
    }

    function setValue(id, value) {
        document.getElementById(id).value = value == null ? "" : String(value);
    }

    function saveInputs() {
        const payload = {
            shipperToken: getValue("shipperToken"),
            driverToken: getValue("driverToken"),
            clientKey: getValue("clientKey"),
            orderId: getValue("orderId"),
            pgOrderId: getValue("pgOrderId"),
            amount: getValue("amount"),
            paymentKey: getValue("paymentKey")
        };
        localStorage.setItem(LS_KEY, JSON.stringify(payload));
        log("inputs saved", payload);
    }

    function loadInputs() {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        try {
            const v = JSON.parse(raw);
            setValue("shipperToken", v.shipperToken || "");
            setValue("driverToken", v.driverToken || "");
            setValue("clientKey", v.clientKey || "");
            setValue("orderId", v.orderId || "");
            setValue("pgOrderId", v.pgOrderId || "");
            setValue("amount", v.amount || "");
            setValue("paymentKey", v.paymentKey || "");
        } catch (_) {
            // ignore
        }
    }

    function savePrepareState(data) {
        localStorage.setItem(LS_PREPARE, JSON.stringify(data));
        renderPrepareInfo();
    }

    function getPrepareState() {
        const raw = localStorage.getItem(LS_PREPARE);
        if (!raw) return null;
        try { return JSON.parse(raw); } catch (_) { return null; }
    }

    function renderPrepareInfo() {
        const state = getPrepareState();
        document.getElementById("prepareInfo").textContent = "prepare: " + (state ? JSON.stringify(state, null, 2) : "none");
    }

    function renderRedirectInfo() {
        const p = new URLSearchParams(window.location.search);
        const info = {
            flow: p.get("flow"),
            paymentKey: p.get("paymentKey"),
            orderId: p.get("orderId"),
            amount: p.get("amount"),
            code: p.get("code"),
            message: p.get("message")
        };
        document.getElementById("redirectInfo").textContent = "redirect: " + JSON.stringify(info, null, 2);
        if (info.paymentKey) setValue("paymentKey", info.paymentKey);
        if (info.orderId) setValue("pgOrderId", info.orderId);
        if (info.amount) setValue("amount", info.amount);
    }

    async function parseResponse(res) {
        const raw = await res.text();
        if (!raw) return {};
        try { return JSON.parse(raw); } catch (_) { return { raw: raw }; }
    }

    function authHeader(token) {
        return { "Authorization": "Bearer " + token };
    }

    function buildDummyOrderRequest() {
        const now = Date.now();
        return {
            startAddr: "서울 종로구 테스트출발 " + now,
            startPlace: "테스트 출발지",
            startType: "상차",
            startSchedule: "오늘 14:00",
            puProvince: "서울",
            startLat: 37.5729,
            startLng: 126.9794,
            endAddr: "경기 수원시 테스트도착 " + now,
            endPlace: "테스트 도착지",
            endType: "하차",
            endSchedule: "오늘 18:00",
            doProvince: "경기",
            cargoContent: "테스트 화물",
            loadMethod: "독차",
            workType: "지게차",
            tonnage: 1.0,
            reqCarType: "카고",
            reqTonnage: "1톤",
            driveMode: "편도",
            loadWeight: 1000,
            basePrice: 50000,
            laborFee: 3000,
            packagingPrice: 1000,
            insuranceFee: 1000,
            payMethod: "카드",
            instant: true,
            memo: "toss live auto order",
            tag: ["toss", "auto"],
            distance: 12000,
            duration: 1800
        };
    }

    async function patchDriverStatus(orderId, status, driverToken) {
        const url = getBaseUrl()
            + "/api/v1/orders/" + encodeURIComponent(orderId)
            + "/status?newStatus=" + encodeURIComponent(status);
        const res = await fetch(url, { method: "PATCH", headers: authHeader(driverToken) });
        const json = await parseResponse(res);
        log("driver status response", { statusCode: res.status, nextStatus: status, body: json });
        return res.ok;
    }

    async function bootstrapOrderFlow() {
        const shipperToken = getValue("shipperToken");
        const driverToken = getValue("driverToken");
        if (!shipperToken || !driverToken) {
            alert("shipperToken, driverToken 입력 필요");
            return;
        }

        const createUrl = getBaseUrl() + "/api/v1/orders";
        const requestBody = buildDummyOrderRequest();
        log("create order request", { url: createUrl, body: requestBody });
        const createRes = await fetch(createUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeader(shipperToken) },
            body: JSON.stringify(requestBody)
        });
        const createJson = await parseResponse(createRes);
        log("create order response", { status: createRes.status, body: createJson });

        const orderId = createJson?.data?.orderId || createJson?.orderId;
        if (!createRes.ok || !orderId) {
            alert("order create failed");
            return;
        }

        setValue("orderId", orderId);
        setValue("pgOrderId", "");
        setValue("paymentKey", "");

        const acceptUrl = getBaseUrl() + "/api/v1/orders/" + encodeURIComponent(orderId) + "/accept";
        log("driver accept request", { url: acceptUrl });
        const acceptRes = await fetch(acceptUrl, { method: "PATCH", headers: authHeader(driverToken) });
        const acceptJson = await parseResponse(acceptRes);
        log("driver accept response", { status: acceptRes.status, body: acceptJson });
        if (!acceptRes.ok) {
            alert("driver accept failed");
            return;
        }

        const statuses = ["LOADING", "IN_TRANSIT", "UNLOADING", "COMPLETED"];
        for (const status of statuses) {
            const ok = await patchDriverStatus(orderId, status, driverToken);
            if (!ok) {
                alert("order status update failed: " + status);
                return;
            }
        }

        saveInputs();
        alert("order bootstrap success: orderId=" + orderId);
    }

    function isInsecureExternalOrigin() {
        const host = window.location.hostname;
        const isLocal = host === "localhost" || host === "127.0.0.1";
        return window.location.protocol !== "https:" && !isLocal;
    }

    async function prepare() {
        const shipperToken = getValue("shipperToken");
        const orderId = getValue("orderId");
        if (!shipperToken || !orderId) {
            alert("shipperToken, orderId 입력 필요");
            return;
        }
        saveInputs();
        const url = getBaseUrl() + "/api/v1/payments/orders/" + orderId + "/toss/prepare";
        const body = {
            method: "CARD",
            payChannel: "APP_CARD",
            orderName: "Toss Live Test",
            successUrl: getSuccessUrl(),
            failUrl: getFailUrl()
        };
        log("prepare request", { url, body });
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeader(shipperToken) },
            body: JSON.stringify(body)
        });
        const json = await parseResponse(res);
        log("prepare response", { status: res.status, body: json });
        if (!res.ok || !json.success || !json.data) {
            alert("prepare failed");
            return;
        }
        const d = json.data;
        setValue("pgOrderId", d.pgOrderId);
        setValue("amount", d.amount);
        if (!getValue("clientKey") && d.clientKey) setValue("clientKey", d.clientKey);
        savePrepareState(d);
        saveInputs();
        alert("prepare success");
    }

    async function openTossWindow() {
        const clientKey = getValue("clientKey");
        const prepared = getPrepareState();
        if (!prepared) {
            alert("prepare 먼저 실행");
            return;
        }
        if (!clientKey) {
            alert("clientKey 입력 필요");
            return;
        }
        if (!window.TossPayments) {
            alert("Toss SDK 로드 실패");
            return;
        }
        if (isInsecureExternalOrigin()) {
            alert("외부 도메인에서는 https로 접속해야 결제창이 정상 동작합니다.");
            log("blocked by insecure origin", { origin: window.location.origin });
            return;
        }

        const amountValue = Number(prepared.amount);
        const orderName = prepared.orderName || "Toss Live Test";
        const pgOrderId = prepared.pgOrderId;
        const successUrl = getSuccessUrl();
        const failUrl = getFailUrl();
        const customerKey = "cust_" + Date.now();

        log("open payment window", { pgOrderId, amountValue, successUrl, failUrl, customerKey });

        try {
            const tossPayments = window.TossPayments(clientKey);
            const payment = tossPayments.payment({ customerKey: customerKey });
            await payment.requestPayment({
                method: "CARD",
                amount: { currency: "KRW", value: amountValue },
                orderId: pgOrderId,
                orderName: orderName,
                successUrl: successUrl,
                failUrl: failUrl
            });
        } catch (firstError) {
            log("open payment v2 failed, fallback to v1", { message: String(firstError) });
            try {
                const tossPayments = window.TossPayments(clientKey);
                await tossPayments.requestPayment("카드", {
                    amount: amountValue,
                    orderId: pgOrderId,
                    orderName: orderName,
                    successUrl: successUrl,
                    failUrl: failUrl
                });
            } catch (fallbackError) {
                log("open payment fallback failed", { message: String(fallbackError) });
                alert("결제창 열기 실패");
            }
        }
    }

    async function confirmToss() {
        const shipperToken = getValue("shipperToken");
        const orderId = getValue("orderId");
        const paymentKey = getValue("paymentKey");
        const pgOrderId = getValue("pgOrderId");
        const amount = getValue("amount");

        if (!shipperToken || !orderId || !paymentKey) {
            alert("shipperToken, orderId, paymentKey 입력 필요");
            return;
        }
        const body = { paymentKey: paymentKey };
        if (pgOrderId) body.pgOrderId = pgOrderId;
        if (amount) body.amount = Number(amount);

        const url = getBaseUrl() + "/api/v1/payments/orders/" + orderId + "/toss/confirm";
        log("confirm request", { url, body });
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeader(shipperToken) },
            body: JSON.stringify(body)
        });
        const json = await parseResponse(res);
        log("confirm response", { status: res.status, body: json });
        if (!res.ok || !json.success) {
            alert("confirm failed");
            return;
        }
        alert("confirm success");
    }

    async function driverConfirm() {
        const driverToken = getValue("driverToken");
        const orderId = getValue("orderId");
        if (!driverToken || !orderId) {
            alert("driverToken, orderId 입력 필요");
            return;
        }
        const url = getBaseUrl() + "/api/v1/payments/orders/" + orderId + "/confirm";
        log("driver confirm request", { url });
        const res = await fetch(url, { method: "POST", headers: authHeader(driverToken) });
        const json = await parseResponse(res);
        log("driver confirm response", { status: res.status, body: json });
        if (!res.ok || !json.success) {
            alert("driver confirm failed");
            return;
        }
        alert("driver confirm success");
    }

    (function init() {
        setValue("baseUrl", getBaseUrl());
        setValue("successUrl", getSuccessUrl());
        setValue("failUrl", getFailUrl());
        loadInputs();
        renderPrepareInfo();
        renderRedirectInfo();
        saveInputs();
        log("initialized", { page: window.location.href });
    })();
</script>
</body>
</html>
