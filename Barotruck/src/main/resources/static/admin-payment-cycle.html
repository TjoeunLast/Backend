<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>관리자 결제 사이클</title>
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #111827; }
        .wrap { max-width: 1080px; margin: 24px auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; }
        h1 { margin: 0 0 10px; font-size: 24px; }
        .desc { margin-bottom: 14px; color: #4b5563; font-size: 13px; white-space: pre-wrap; }
        .nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .nav a {
            text-decoration: none;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            background: #eff6ff;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
        }
        .row { display: grid; grid-template-columns: 220px 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
        label { font-size: 14px; color: #374151; }
        input, textarea, select, button { font-size: 14px; }
        input, textarea, select {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 8px;
        }
        textarea { min-height: 72px; resize: vertical; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        button {
            border: 0;
            border-radius: 6px;
            background: #0f766e;
            color: #fff;
            padding: 8px 12px;
            cursor: pointer;
        }
        button.secondary { background: #374151; }
        .box {
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: #fafafa;
            padding: 12px;
            overflow: auto;
        }
        pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
        .mono { font-family: Consolas, monospace; }
    </style>
</head>
<body>
<div class="wrap">
    <h1 id="pageTitle">사이클 테스트</h1>
    <div id="pageDesc" class="desc"></div>

    <div class="nav">
        <a href="/api/v1/payments/admin-cycles">사이클 홈</a>
        <a href="/api/v1/payments/admin-cycle-a">A</a>
        <a href="/api/v1/payments/admin-cycle-b">B</a>
        <a href="/api/v1/payments/admin-cycle-c">C</a>
        <a href="/api/v1/payments/admin-cycle-d">D</a>
        <a href="/api/v1/payments/admin-cycle-e">E</a>
        <a href="/api/v1/payments/admin-cycle-f">F</a>
    </div>

    <div id="inputs"></div>

    <div class="actions">
        <button type="button" class="secondary" id="saveBtn">입력 저장</button>
        <button type="button" class="secondary" id="clearBtn">로그 지우기</button>
    </div>

    <h2>실행</h2>
    <div id="actions" class="actions"></div>

    <h2>응답</h2>
    <div class="box mono"><pre id="response">none</pre></div>

    <h2>로그</h2>
    <div class="box mono"><pre id="log">ready</pre></div>
</div>

<script src="/api/v1/payments/admin-cycle.js" defer></script>
</body>
</html>
